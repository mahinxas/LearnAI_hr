<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a1322" />
    <title>LeAIrn HR - Offline</title>
    <style>
      :root {
        color: #0a1322;
        background: #fdfaf3;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 560px;
        border: 1px solid #d8e0ed;
        border-radius: 18px;
        background: #fff;
        padding: 32px;
        box-shadow: 0 18px 60px rgba(10, 19, 34, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1;
      }

      p {
        margin: 0;
        color: #4f5f76;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        border-radius: 999px;
        background: #0a1322;
        color: #fdfaf3;
        padding: 12px 18px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline mode</h1>
      <p>
        LeAIrn HR can still show cached learning content while offline. API-backed
        AI features are unavailable until the connection returns.
      </p>
      <a href="/">Return to cached app</a>
    </main>
  </body>
</html>
